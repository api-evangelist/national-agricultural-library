aid: national-agricultural-library
name: National Agricultural Library
description: >-
  The USDA National Agricultural Library houses one of the world's largest
  collections devoted to agriculture and its related sciences, and operates
  FoodData Central, an integrated data system providing nutrient profiles for
  foods.
